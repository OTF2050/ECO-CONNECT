<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eco Connect emblem">
  <defs>
    <linearGradient id="ecGreen" x1="80" y1="60" x2="300" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ec24a"/>
      <stop offset="0.5" stop-color="#2f9e44"/>
      <stop offset="1" stop-color="#0f5132"/>
    </linearGradient>
    <linearGradient id="ecGold" x1="320" y1="70" x2="520" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9cf8a"/>
      <stop offset="0.45" stop-color="#c79a3c"/>
      <stop offset="1" stop-color="#7a5a1e"/>
    </linearGradient>
    <linearGradient id="ecNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9be36a"/>
      <stop offset="1" stop-color="#2f9e44"/>
    </linearGradient>
  </defs>

  <!-- ===== GREEN LEAF HALF (left) ===== -->
  <g>
    <path d="M300 70
             C200 90 110 165 105 290
             C101 380 150 470 250 520
             C210 430 205 330 250 250
             C290 180 300 120 300 70 Z"
          fill="url(#ecGreen)"/>
    <!-- circuit traces on the leaf -->
    <g stroke="#0f5132" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M255 250 L255 360"/>
      <path d="M255 300 L205 330"/>
      <path d="M255 330 L300 300"/>
      <path d="M255 390 L215 420"/>
    </g>
    <g fill="#0f5132">
      <circle cx="205" cy="330" r="11"/>
      <circle cx="300" cy="300" r="11"/>
      <circle cx="215" cy="420" r="11"/>
    </g>
  </g>

  <!-- ===== GOLD SKYLINE HALF (right) ===== -->
  <g>
    <path d="M300 70
             C400 90 495 165 500 295
             C505 410 440 500 345 525
             L345 470
             C420 445 470 375 465 300
             C460 195 390 130 300 118 Z"
          fill="url(#ecGold)"/>
    <!-- Dubai skyline silhouette -->
    <g fill="#7a5a1e">
      <rect x="345" y="330" width="14" height="120"/>
      <rect x="362" y="300" width="16" height="150"/>
      <!-- Burj Khalifa style spire -->
      <path d="M392 130 L399 130 L404 300 L408 360 L383 360 L388 300 Z"/>
      <rect x="412" y="265" width="18" height="185"/>
      <rect x="433" y="305" width="14" height="145"/>
      <rect x="449" y="345" width="12" height="105"/>
    </g>
    <!-- UAE flag -->
    <g>
      <rect x="437" y="170" width="3" height="70" fill="#7a5a1e"/>
      <rect x="440" y="170" width="14" height="9" fill="#e60000"/>
      <rect x="454" y="170" width="34" height="9" fill="#0a7d2c"/>
      <rect x="454" y="179" width="34" height="9" fill="#f7f7f7"/>
      <rect x="454" y="188" width="34" height="9" fill="#111111"/>
    </g>
  </g>

  <!-- ===== CENTER CONNECTING NODE ===== -->
  <g>
    <path d="M250 360 L300 300" stroke="#2f9e44" stroke-width="9" stroke-linecap="round"/>
    <circle cx="300" cy="300" r="26" fill="url(#ecNode)"/>
    <circle cx="300" cy="300" r="11" fill="#0a0a0a"/>
  </g>
</svg>
